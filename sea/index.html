<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="version" content="0.11.0">
    <title>Real-Time Ocean Simulation</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            overflow: hidden;
            background: #000;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
        }
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #00aaff;
            font-family: Arial, sans-serif;
            font-size: 18px;
            pointer-events: none;
            transition: opacity 0.5s;
        }
        #info {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #fff;
            font-family: monospace;
            font-size: 12px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="canvas-container"></div>
    <div id="loading">Loading Ocean Simulation...</div>
    <div id="info">
        WASD: Move | Mouse: Look | Scroll: Zoom<br>
        WebGL 2.0 Hybrid FFT Ocean Simulation
    </div>

    <!-- Three.js from CDN -->
    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>

    <!-- Shader Chunks for GPGPU -->
    <script type="x-shader/x-fragment" id="compute-vertex">
        void main() {
            gl_Position = vec4(position, 1.0);
        }
    </script>

    <!-- Ocean Surface Shaders -->
    <script type="x-shader/x-vertex" id="ocean-vertex">
        uniform sampler2D uDisplacementMap;
        uniform float uTime;
        uniform float uGridSize;
        uniform float uGridResolution;
        uniform vec2 uWindDir;
        uniform float uCrestLean;

        // Near-shore shallow water (L2) blended over the open-ocean field
        uniform sampler2D uSweTexture;   // (depth, vx, vz, surfaceY)
        uniform vec2 uSweOrigin;
        uniform float uSweSize;
        uniform float uSweTexel;
        uniform float uSweEnabled;
        uniform float uSeaLevel;

        varying vec3 vWorldPosition;
        varying vec3 vNormal;
        varying vec2 vUv;
        varying float vDisplacement;
        varying float vFoam;
        varying float vSweMask;
        varying float vSweDepth;
        varying float vSweSpeed;

        void main() {
            vUv = uv;

            // Read displacement data (RGB = XYZ displacement, A = Jacobian/foam)
            vec4 data = texture2D(uDisplacementMap, uv);
            vec3 displacement = data.rgb;

            // === Open-ocean normal from the displacement field ===
            float texelSize = 1.0 / uGridResolution;
            vec3 pRight = texture2D(uDisplacementMap, uv + vec2(texelSize, 0.0)).rgb;
            vec3 pDown  = texture2D(uDisplacementMap, uv + vec2(0.0, texelSize)).rgb;

            // Stylised forward-lean (applied on the corrected geometry): linear
            // FFT crests are fore-aft symmetric, but illustrated breakers pitch
            // downwind — long gentle back, steep front. Shift the surface along
            // the wind by an amount proportional to crest height. The neighbour
            // samples get the same shift so the reconstructed normal follows it.
            vec3 leanDir = vec3(normalize(uWindDir).x, 0.0, normalize(uWindDir).y) * uCrestLean;
            displacement += leanDir * max(displacement.y, 0.0);
            pRight       += leanDir * max(pRight.y, 0.0);
            pDown        += leanDir * max(pDown.y, 0.0);

            // Displacement from sea.js is already the final world offset
            vec3 newPosition = position + displacement;

            float gridStep = uGridSize / uGridResolution;
            vec3 vRight = vec3(gridStep, 0.0, 0.0) + (pRight - displacement);
            vec3 vDown  = vec3(0.0, 0.0, gridStep) + (pDown - displacement);
            vec3 oceanNormal = normalize(cross(vDown, vRight));

            vec4 worldPosition = modelMatrix * vec4(newPosition, 1.0);
            vec3 normal = oceanNormal;
            float mask = 0.0;
            float sweDepth = 0.0;
            float sweSpeed = 0.0;

            // === Near-shore blend ===
            // Inside the SWE patch, replace the open-ocean surface with the
            // shallow-water solution and drop the choppy horizontal swizzle.
            if (uSweEnabled > 0.5) {
                vec2 sUv = (worldPosition.xz - uSweOrigin) / uSweSize + 0.5;
                if (sUv.x > 0.001 && sUv.x < 0.999 && sUv.y > 0.001 && sUv.y < 0.999) {
                    vec4 sw = texture2D(uSweTexture, sUv);
                    mask = smoothstep(0.0, 0.09, min(min(sUv.x, 1.0 - sUv.x), min(sUv.y, 1.0 - sUv.y)));
                    sweDepth = sw.x;
                    sweSpeed = length(sw.yz);

                    vec3 flatLocal = vec3(position.x, newPosition.y, position.z);
                    vec3 mixedLocal = mix(newPosition, flatLocal, mask);
                    vec4 wpFlat = modelMatrix * vec4(mixedLocal, 1.0);
                    float worldY = mix(worldPosition.y, sw.w, mask);
                    worldPosition = vec4(wpFlat.x, worldY, wpFlat.z, 1.0);

                    float hX = texture2D(uSweTexture, sUv + vec2(uSweTexel, 0.0)).w;
                    float hZ = texture2D(uSweTexture, sUv + vec2(0.0, uSweTexel)).w;
                    float eWorld = uSweSize * uSweTexel;
                    vec3 sweNormal = normalize(vec3(sw.w - hX, eWorld, sw.w - hZ));
                    normal = normalize(mix(oceanNormal, sweNormal, mask));
                }
            }

            vWorldPosition = worldPosition.xyz;
            vNormal = normal;
            vDisplacement = worldPosition.y - uSeaLevel;
            vFoam = 1.0 - data.a; // Jacobian < 1 is compressed
            vSweMask = mask;
            vSweDepth = sweDepth;
            vSweSpeed = sweSpeed;

            gl_Position = projectionMatrix * viewMatrix * worldPosition;
        }
    </script>

    <script type="x-shader/x-fragment" id="ocean-fragment">
        uniform sampler2D uDisplacementMap;
        uniform vec3 uWaterColorDeep;
        uniform vec3 uWaterColorMid;
        uniform vec3 uWaterColorShallow;
        uniform vec3 uWaterColorShadow;
        uniform vec3 uFoamColor;
        uniform vec3 uSunPosition;
        uniform vec3 uCameraPosition;
        uniform sampler2D uFoamTexture;
        uniform float uFoamThreshold;
        uniform float uTime;
        uniform vec3 uSssColor;
        uniform float uSssStrength;
        uniform float uSpecPower;
        uniform float uSpecIntensity;
        uniform float uWaterContrast;
        uniform vec2 uWindDir;
        uniform vec3 uSkyHorizon;
        uniform vec3 uSkyZenith;
        uniform float uFogDensity;
        uniform float uChopAmount;
        uniform float uDetailPatchiness;
        uniform float uAmpNorm;

        varying vec3 vWorldPosition;
        varying vec3 vNormal;
        varying vec2 vUv;
        varying float vDisplacement;
        varying float vFoam;
        varying float vSweMask;
        varying float vSweDepth;
        varying float vSweSpeed;

        // Simplex noise function for detail
        vec3 mod289(vec3 x) { return x - floor(x * (1.0 / 289.0)) * 289.0; }
        vec2 mod289(vec2 x) { return x - floor(x * (1.0 / 289.0)) * 289.0; }
        vec3 permute(vec3 x) { return mod289(((x*34.0)+1.0)*x); }
        
        float snoise(vec2 v) {
            const vec4 C = vec4(0.211324865405187, 0.366025403784439,
                               -0.577350269189626, 0.024390243902439);
            vec2 i  = floor(v + dot(v, C.yy));
            vec2 x0 = v - i + dot(i, C.xx);
            vec2 i1 = (x0.x > x0.y) ? vec2(1.0, 0.0) : vec2(0.0, 1.0);
            vec4 x12 = x0.xyxy + C.xxzz;
            x12.xy -= i1;
            i = mod289(i);
            vec3 p = permute(permute(i.y + vec3(0.0, i1.y, 1.0))
                           + i.x + vec3(0.0, i1.x, 1.0));
            vec3 m = max(0.5 - vec3(dot(x0,x0), dot(x12.xy,x12.xy),
                                   dot(x12.zw,x12.zw)), 0.0);
            m = m*m; m = m*m;
            vec3 x = 2.0 * fract(p * C.www) - 1.0;
            vec3 h = abs(x) - 0.5;
            vec3 ox = floor(x + 0.5);
            vec3 a0 = x - ox;
            m *= 1.79284291400159 - 0.85373472095314 * (a0*a0 + h*h);
            vec3 g;
            g.x = a0.x * x0.x + h.x * x0.y;
            g.yz = a0.yz * x12.xz + h.yz * x12.yw;
            return 130.0 * dot(m, g);
        }

        float hash21(vec2 p) {
            p = fract(p * vec2(123.34, 456.21));
            p += dot(p, p + 45.32);
            return fract(p.x * p.y);
        }

        float cellularEdge(vec2 p) {
            vec2 i = floor(p);
            vec2 f = fract(p);
            float f1 = 8.0;
            float f2 = 8.0;
            for (int y = -1; y <= 1; y++) {
                for (int x = -1; x <= 1; x++) {
                    vec2 g = vec2(float(x), float(y));
                    vec2 o = vec2(hash21(i + g), hash21(i + g + 17.7));
                    vec2 r = g + o - f;
                    float d = dot(r, r);
                    if (d < f1) {
                        f2 = f1;
                        f1 = d;
                    } else if (d < f2) {
                        f2 = d;
                    }
                }
            }
            return sqrt(f2) - sqrt(f1);
        }

        float foamLace(vec2 worldXZ, vec2 windDir, float time) {
            vec2 crossWind = vec2(-windDir.y, windDir.x);
            vec2 laneUv = vec2(dot(worldXZ, windDir), dot(worldXZ, crossWind));
            float broad = snoise(laneUv * vec2(0.012, 0.028) + vec2(time * 0.025, 3.1));
            float medium = snoise(laneUv * vec2(0.035, 0.075) - vec2(time * 0.055, 1.7));
            float warp = broad * 5.5 + medium * 1.8;
            vec2 warped = worldXZ + windDir * warp + crossWind * medium * 2.5;

            float largeCells = cellularEdge(warped * 0.045 + windDir * time * 0.045);
            float midCells = cellularEdge(warped * 0.095 + vec2(7.2, 3.4) + windDir * time * 0.10);
            float fineCells = cellularEdge(warped * 0.19 + vec2(2.6, 11.8) - windDir * time * 0.16);

            float largeMask = smoothstep(-0.55, 0.35, broad);
            float fineMask = smoothstep(0.15, 0.85, medium);
            float large = smoothstep(0.26, 0.055, largeCells) * largeMask;
            float mid = smoothstep(0.19, 0.045, midCells);
            float fine = smoothstep(0.13, 0.032, fineCells) * fineMask;
            return clamp(max(large * 0.95, mid * 0.72) + fine * 0.34, 0.0, 1.0);
        }
        
        void main() {
            vec3 viewDir = normalize(uCameraPosition - vWorldPosition);
            vec3 sunDir = normalize(uSunPosition);
            float dist = length(vWorldPosition - uCameraPosition);

            // === High-frequency detail normals ===
            // The chop band keeps only a reduced geometric share; the rest of
            // its detail is injected here, fading with distance so the far
            // field stays calm (and free of specular shimmer)
            float detailAmp = uChopAmount * smoothstep(420.0, 70.0, dist);
            vec3 normal = normalize(vNormal);
            if (detailAmp > 0.001) {
                // Wind-lane patchiness: the ripple field arrives in drifting
                // downwind streaks with glassy gaps between them, instead of
                // one uniform carpet of identical dimples covering everything.
                vec2 w = normalize(uWindDir);
                vec2 lane = vec2(dot(vWorldPosition.xz, w) * 0.35,
                                 dot(vWorldPosition.xz, vec2(-w.y, w.x)));
                float patches = snoise(lane * 0.016 + uTime * 0.02) * 0.6
                              + snoise(lane * 0.045 - uTime * 0.013) * 0.4;
                patches = smoothstep(-0.35, 0.55, patches);
                detailAmp *= mix(1.0, patches, uDetailPatchiness);

                vec2 drift = vec2(0.6, 0.8) * uTime * 1.55;
                float e = 0.35;
                vec2 p1 = vWorldPosition.xz * 0.55 + drift * 1.1;
                vec2 p2 = vWorldPosition.xz * 1.7 - drift * 0.6;
                float n1 = snoise(p1);
                float n2 = snoise(p2);
                vec2 g1 = vec2(snoise(p1 + vec2(e, 0.0)) - n1, snoise(p1 + vec2(0.0, e)) - n1) / e;
                vec2 g2 = vec2(snoise(p2 + vec2(e, 0.0)) - n2, snoise(p2 + vec2(0.0, e)) - n2) / e;
                vec2 grad = g1 * 0.7 + g2 * 0.3;
                normal = normalize(normal + vec3(-grad.x, 0.0, -grad.y) * 0.10 * detailAmp);
            }

            // Fresnel
            float fresnel = pow(1.0 - max(dot(viewDir, normal), 0.0), 5.0);
            fresnel = mix(0.03, 1.0, fresnel);

            // === Toon cel water colour (swatch-accurate) ===
            // The palette swatches are the exact colours that reach the screen
            // pre-fog: every band SELECTS between swatches, never multiplies,
            // so hue and saturation cannot drift away from the art direction.
            float hT = clamp(vDisplacement / uAmpNorm * 0.5 + 0.5, 0.0, 1.0);
            float grazing = pow(1.0 - max(dot(viewDir, normal), 0.0), 2.0);
            float rampT = clamp(smoothstep(0.1, 0.95, hT) * 0.75 + grazing * 0.25, 0.0, 1.0);

            // Watercolour mottle nudges texels across the band boundaries so
            // the flat fills stay painterly without tinting the swatches.
            float mottle = snoise(vWorldPosition.xz * 0.035) * 0.5
                         + snoise(vWorldPosition.xz * 0.11 + 7.0) * 0.25;
            rampT = clamp(rampT + mottle * 0.10, 0.0, 1.0);

            // Two hard cuts split the surface into trough / base / lit fills
            float cutDeep = smoothstep(0.30, 0.36, rampT);
            float cutLit  = smoothstep(0.62, 0.68, rampT);
            vec3 waterColor = mix(uWaterColorDeep, uWaterColorMid, cutDeep);
            waterColor = mix(waterColor, uWaterColorShallow, cutLit);

            // Cel shadow: flanks facing away from the sun swing towards the
            // desaturated slope blue, not towards a darkened copy of the base
            float lambert = max(dot(normal, sunDir), 0.0);
            float litBand = smoothstep(0.42, 0.5, lambert);
            float shadeBand = 1.0 - smoothstep(0.28, 0.4, lambert);
            waterColor = mix(waterColor, uWaterColorShadow, shadeBand * uWaterContrast);

            // === Painted backlight band (flat, replaces physical SSS) ===
            // Tall backlit crests snap to a single near-white translucent band
            float backlight = max(dot(viewDir, -sunDir), 0.0);
            float sssBand = smoothstep(0.45, 0.6, backlight * clamp(hT + 0.15, 0.0, 1.0));
            waterColor = mix(waterColor, uSssColor, sssBand * clamp(uSssStrength * 0.4, 0.0, 1.0));

            // === Painted highlight (hard-edged, replaces specular + glitter) ===
            // A flat, stepped sun streak — no shimmering micro-sparkle.
            vec3 halfDir = normalize(viewDir + sunDir);
            float specAngle = max(dot(normal, halfDir), 0.0);
            float hiBand = smoothstep(0.86, 0.9, pow(specAngle, max(uSpecPower * 0.2, 1.0)));

            // === Foam: sparse crisp crest crescents (hard edges) ===
            // The choppy-displacement sign is now correct, so the Jacobian folds
            // on the crests: (1 - Jacobian) peaks exactly where whitecaps belong.
            // The panel Threshold drives both generation (sea.js) and the display
            // cut below, so it reads as one coherent coverage knob.
            float foamAcc = texture2D(uFoamTexture, vUv).r;
            float jacobian = texture2D(uDisplacementMap, vUv).a;
            float crestNow = clamp(1.0 - jacobian, 0.0, 1.5);

            // Torn-edge noise (0..1) jitters the cut so the white edge breaks
            // into hand-painted chunks rather than a clean contour.
            float edgeNoise = snoise(vWorldPosition.xz * 0.6 + uTime * 0.12) * 0.5 + 0.5;
            float edgeNoise2 = snoise(vWorldPosition.xz * 1.9 - uTime * 0.2) * 0.5 + 0.5;
            float tear = mix(edgeNoise, edgeNoise2, 0.4);
            // Display cut moves the SAME direction as generation: a higher panel
            // Threshold lowers the cut, so more crest fold shows as foam. The
            // tear noise jitters it for a hand-drawn edge.
            float crestCut = (0.82 - 0.62 * uFoamThreshold) + (tear - 0.5) * 0.18;
            float accCut = 0.72 - 0.44 * uFoamThreshold;
            float lace = foamLace(vWorldPosition.xz, normalize(uWindDir), uTime)
                       * smoothstep(accCut * 0.42, accCut + 0.16, foamAcc);
            vec2 wuv = vec2(dot(vWorldPosition.xz, normalize(uWindDir)) * 0.18,
                            dot(vWorldPosition.xz, vec2(-uWindDir.y, uWindDir.x)) * 0.75);
            float windTear = smoothstep(-0.25, 0.55, snoise(wuv + vec2(uTime * 0.22, 0.0)));

            // Crest lip: instantaneous fold above the cut — the crisp crescent.
            float whitecap = smoothstep(crestCut, crestCut + 0.075, crestNow);
            // Trailing streak: advected accumulation behind the crest, broken by
            // the tear so it trails rather than blankets.
            float trailing = smoothstep(accCut, accCut + 0.13, foamAcc) * max(smoothstep(0.38, 0.78, tear), windTear * 0.75);

            // Near-shore breakers: fast, shallow shallow-water flow turns white.
            float shoreBand = smoothstep(0.015, 0.16, vSweDepth) * smoothstep(1.25, 0.16, vSweDepth);
            float shoreFoam = (smoothstep(0.35, 1.25, vSweSpeed) + shoreBand * 0.85) * vSweMask;

            float foamMix = clamp(whitecap * 1.25 + trailing * 0.85 + lace * 0.8 + shoreFoam, 0.0, 1.0);
            // Foam is the flat palette white; shadowed foam dips towards the
            // shadow swatch instead of grey so it stays inside the palette.
            vec3 foamColor = mix(mix(uFoamColor, uWaterColorShadow, 0.25), uFoamColor, litBand);

            // === Combine (matte: no Fresnel sky mirror) ===
            vec3 finalColor = waterColor;
            finalColor = mix(finalColor, uFoamColor, hiBand * uSpecIntensity * 0.6);
            finalColor = mix(finalColor, foamColor, foamMix);

            // === Atmospheric perspective ===
            // Fog colour equals the sky horizon so the surface dissolves into
            // the sky; troughs catch slightly more haze than crests
            float heightFactor = mix(1.1, 0.85, clamp(vDisplacement / uAmpNorm * 0.5 + 0.5, 0.0, 1.0));
            float fogAmt = 1.0 - exp(-dist * uFogDensity * heightFactor);
            finalColor = mix(finalColor, uSkyHorizon, fogAmt);

            // Wet/dry: where the shallow-water column thins to nothing, fade the
            // surface out so the dry beach (seabed) shows through. Discarding
            // near-zero alpha avoids writing depth over the sand.
            float alpha = 0.92 + fresnel * 0.08;
            float wet = mix(1.0, smoothstep(0.02, 0.3, vSweDepth), vSweMask);
            alpha *= wet;
            if (alpha < 0.02) discard;

            gl_FragColor = vec4(finalColor, alpha);
        }
    </script>

    <!-- Seabed Shaders -->
    <script type="x-shader/x-vertex" id="seabed-vertex">
        uniform float uSeabedLevel;
        uniform float uTime;

        varying vec3 vWorldPosition;
        varying vec3 vNormal;
        varying float vHeight;

        // Shared near-shore terrain field (defines terrainHeight); injected
        // from terrain.js so the seabed and the SWE bed are identical.
        //__TERRAIN__

        void main() {
            vec2 worldPos = (modelMatrix * vec4(position, 1.0)).xz;

            float height = terrainHeight(worldPos);

            vec3 newPosition = position;
            newPosition.y = height;

            vec4 worldPosition = modelMatrix * vec4(newPosition, 1.0);
            vWorldPosition = worldPosition.xyz;
            vHeight = height;

            // Normal from the terrain height derivatives
            float eps = 1.0;
            float hL = terrainHeight(worldPos - vec2(eps, 0.0));
            float hR = terrainHeight(worldPos + vec2(eps, 0.0));
            float hD = terrainHeight(worldPos - vec2(0.0, eps));
            float hU = terrainHeight(worldPos + vec2(0.0, eps));

            vNormal = normalize(vec3(hL - hR, 2.0 * eps, hD - hU));

            gl_Position = projectionMatrix * viewMatrix * worldPosition;
        }
    </script>

    <script type="x-shader/x-fragment" id="seabed-fragment">
        uniform vec3 uCameraPosition;
        uniform float uSeaLevel;
        uniform float uTime;
        uniform vec3 uSkyHorizon;
        uniform float uFogDensity;

        varying vec3 vWorldPosition;
        varying vec3 vNormal;
        varying float vHeight;
        
        // Voronoi noise for caustics
        vec2 hash2(vec2 p) {
            return fract(sin(vec2(dot(p, vec2(127.1, 311.7)), dot(p, vec2(269.5, 183.3)))) * 43758.5453);
        }
        
        float voronoi(vec2 x) {
            vec2 n = floor(x);
            vec2 f = fract(x);
            float md = 8.0;
            for(int j = -1; j <= 1; j++) {
                for(int i = -1; i <= 1; i++) {
                    vec2 g = vec2(float(i), float(j));
                    vec2 o = hash2(n + g);
                    o = 0.5 + 0.5 * sin(uTime * 0.5 + 6.2831 * o);
                    vec2 r = g + o - f;
                    float d = dot(r, r);
                    md = min(md, d);
                }
            }
            return md;
        }
        
        float valueNoise(vec2 p) {
            vec2 i = floor(p);
            vec2 f = fract(p);
            f = f * f * (3.0 - 2.0 * f);
            float a = hash2(i).x;
            float b = hash2(i + vec2(1.0, 0.0)).x;
            float c = hash2(i + vec2(0.0, 1.0)).x;
            float d = hash2(i + vec2(1.0, 1.0)).x;
            return mix(mix(a, b, f.x), mix(c, d, f.x), f.y);
        }

        float fbm2(vec2 p) {
            float v = 0.0;
            float a = 0.5;
            for (int i = 0; i < 4; i++) {
                v += valueNoise(p) * a;
                p *= 2.03;
                a *= 0.5;
            }
            return v;
        }
        
        void main() {
            float slope = 1.0 - abs(vNormal.y);
            float height = vWorldPosition.y - uSeaLevel;
            float grain = fbm2(vWorldPosition.xz * 0.075);
            float coarse = fbm2(vWorldPosition.xz * 0.022 + 8.4);

            vec3 deepColor = vec3(0.06, 0.16, 0.22);
            vec3 wetSand = vec3(0.50, 0.43, 0.31);
            vec3 paleSand = vec3(0.78, 0.70, 0.50);
            vec3 drySand = vec3(0.86, 0.77, 0.54);
            vec3 hardSoil = vec3(0.42, 0.34, 0.23);
            vec3 softSoil = vec3(0.28, 0.36, 0.20);
            vec3 rockColor = vec3(0.30, 0.31, 0.29);
            vec3 vegetation = vec3(0.18, 0.34, 0.16);

            // Material zones: underwater sand, wet beach, dry sand, hard soil,
            // rocky slopes and patchy vegetation. Noise jitters the thresholds
            // so the island does not read as a single painted blob.
            float wetT = smoothstep(-0.5, 0.7, height);
            float dryT = smoothstep(1.0, 4.2, height + (grain - 0.5) * 1.2);
            float soilT = smoothstep(3.5, 9.0, height + (coarse - 0.5) * 3.0);
            float vegT = smoothstep(6.5, 11.0, height + (grain - 0.5) * 2.2)
                       * smoothstep(0.72, 0.18, slope)
                       * smoothstep(0.38, 0.72, coarse);
            float rockT = smoothstep(0.18, 0.55, slope)
                        + smoothstep(10.0, 16.0, height) * 0.45;

            vec3 baseColor = mix(paleSand, wetSand, 1.0 - wetT);
            baseColor = mix(baseColor, drySand, dryT);
            baseColor = mix(baseColor, hardSoil, soilT * 0.65);
            baseColor = mix(baseColor, softSoil, soilT * (1.0 - rockT) * 0.45);
            baseColor = mix(baseColor, vegetation, clamp(vegT, 0.0, 0.85));
            baseColor = mix(baseColor, rockColor, clamp(rockT, 0.0, 0.85));
            baseColor *= 0.88 + grain * 0.24;
            
            // Caustics projection
            vec2 causticCoord = vWorldPosition.xz * 0.1;
            float caustics = voronoi(causticCoord);
            caustics = pow(1.0 - caustics, 3.0) * 0.8;
            
            // Domain warp for animated caustics
            vec2 warp = vec2(
                sin(causticCoord.y * 2.0 + uTime * 0.5) * 0.2,
                cos(causticCoord.x * 2.0 + uTime * 0.3) * 0.2
            );
            float caustics2 = voronoi(causticCoord + warp);
            caustics2 = pow(1.0 - caustics2, 2.0) * 0.5;
            
            caustics = max(caustics, caustics2);
            
            // Add caustics
            baseColor += vec3(0.3, 0.5, 0.6) * caustics;
            
            // Depth fog / absorption
            float depth = uSeaLevel - vWorldPosition.y;
            float absorption = exp(-depth * 0.02);
            baseColor = mix(deepColor, baseColor, absorption);

            // Distance fog: dissolve into the same sky-horizon backdrop the
            // ocean fades to, so the floor reads as infinite with no visible
            // mesh edge. Shares the ocean's fog density for a matched falloff.
            float dist = length(vWorldPosition - uCameraPosition);
            float fogFactor = exp(-dist * uFogDensity);
            baseColor = mix(uSkyHorizon, baseColor, fogFactor);
            
            // Simple lighting
            vec3 lightDir = normalize(vec3(0.5, 1.0, 0.3));
            float diff = max(dot(vNormal, lightDir), 0.0);
            baseColor *= (0.3 + 0.7 * diff);
            
            gl_FragColor = vec4(baseColor, 1.0);
        }
    </script>

    <!-- Main Application -->
    <script type="module" src="main.js"></script>
