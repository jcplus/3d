<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D Experiments</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0f;
      color: #e0e0e0;
      font-family: system-ui, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    nav {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
      text-align: center;
    }
    h1 {
      font-size: 1.25rem;
      font-weight: 400;
      color: #666;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 1rem;
    }
    a {
      display: block;
      padding: 1rem 3rem;
      border: 1px solid #333;
      border-radius: 4px;
      color: #e0e0e0;
      text-decoration: none;
      font-size: 1.1rem;
      letter-spacing: 0.05em;
      transition: border-color 0.2s, color 0.2s;
    }
    a:hover {
      border-color: #888;
      color: #fff;
    }
  </style>
</head>
<body>
  <nav>
    <h1>3D Experiments</h1>
    <a href="/sea/">Sea Simulation</a>
    <a href="/grass/">Grass</a>
  </nav>
</body>
</html>
